    <div id="tooltip"></div>
    <script>
      const tooltip = document.getElementById("map-tooltip");
      const counties = document.querySelectorAll("#map-container path"); // Targets all county shapes
      const locations = document.querySelectorAll("#map-container circle"); // Targets all locations
      const countyNameEl = document.getElementById("county-name");
      const statusLineEl = document.getElementById("status-line");
      const coordXEl = document.getElementById("coord-x");
      const coordYEl = document.getElementById("coord-y");
      const infoContent = document.getElementById("info-content");

      const setPanelData = (name, active = false) => {
        countyNameEl.textContent = name;
        statusLineEl.textContent = active
          ? "TRACKING ACTIVE"
          : "HOVER OVER A COUNTY OR LOCATION";
        statusLineEl.classList.toggle("active", active);
      };

      const updateCoords = (e) => {
        coordXEl.textContent = Math.round(e.pageX);
        coordYEl.textContent = Math.round(e.pageY);
      };

      const resetPanel = () => {
        setPanelData("NONE", false);
      };

      locations.forEach((location) => {
        const locationName =
          location.getAttribute("id") || location.getAttribute("data-name");

        location.addEventListener("mousemove", (e) => {
          setPanelData(locationName, true);
          updateCoords(e);
          tooltip.innerText = locationName;
          tooltip.style.display = "block";

          tooltip.style.left = e.pageX + 15 + "px";
          tooltip.style.top = e.pageY - 30 + "px";
          tooltip.style.color = "rgba(100, 210, 133)";
          location.style.fill = "white";

          if (locationName == "Hakuna Makava") {
            statusLineEl.textContent = "Our Favorite Kava Bar ;)";
            statusLineEl.style.color = "rgba(100, 210, 133)";
          }
        });

        location.addEventListener("mouseleave", () => {
          tooltip.style.display = "none";
          tooltip.style.color = "";
          location.style.fill = ""; // Reset color
          statusLineEl.style.color = "grey";
          resetPanel();
        });

        location.addEventListener("click", () => {
          infoContent.textContent =
            "Hello Bruce... Add information and a picture about each location here";
        });
      });

      counties.forEach((county) => {
        county.addEventListener("mousemove", (e) => {
          const countyName =
            county.getAttribute("id") || county.getAttribute("data-name");

          setPanelData(countyName, true);
          updateCoords(e);
          tooltip.innerText = countyName;
          tooltip.style.display = "block";

          // Position the tooltip near the cursor
          tooltip.style.left = e.pageX + 15 + "px";
          tooltip.style.top = e.pageY + 15 + "px";

          // Optional: Highlight the county on hover
          county.style.fill = "rgba(255, 0, 255, 0.5)";
        });

        county.addEventListener("mouseleave", () => {
          tooltip.style.display = "none";
          county.style.fill = ""; // Reset color
          resetPanel();
        });
      });
    </script>
